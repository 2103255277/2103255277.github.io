<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8 GBK">
<title>那只鸭子的网页小游戏</title>
<link rel="stylesheet" type="text/css" media="screen" href="css/styles.css" />

</head>
<body>
<div class="wrapper">
<h1>这只是一个扫雷小游戏</h1>
<div id="minesweeper">
  <ul class="level-select">
	<li><button data-level="easy">十分简单</button></li>
	<li><button data-level="mid">要点脑子</button></li>
	<li><button data-level="hard">需要安装脑子</button></li>
  </ul>
  <div class="menu">
	<ul>
	  <li class="timer">000</li>
	  <li class="reset"><button> :) </button></li>
	  <li class="mine-count">010</li>
	</ul>
  </div>
  <div id="mine-grid"></div>
</div>
</div>
<script src="js/jquery.min.js"></script>
<script type="text/javascript" src="js/JSweeper.js"></script>
</body>
</html>
